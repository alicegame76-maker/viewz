<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIEWZ - Feed de Vídeos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; overflow-x: hidden; }
        .video-container { height: 100vh; scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .feed::-webkit-scrollbar { display: none; }
        .ui-overlay { position: absolute; bottom: 80px; left: 20px; z-index: 10; text-shadow: 1px 1px 5px rgba(0,0,0,0.8); }
        .add-btn { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: linear-gradient(45deg, #ff00ff, #00ffff); border-radius: 50%; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: bold; box-shadow: 0 0 15px rgba(255,0,255,0.5); z-index: 100; cursor: pointer; }
    </style>
</head>
<body>

    <div class="feed" id="videoFeed">
        <div class="video-container" id="welcomeMsg">
            <div class="text-center p-6">
                <h1 class="text-4xl font-bold mb-4 tracking-tighter">VIEWZ</h1>
                <p class="text-gray-400">Nenhum vídeo ainda. Toque no + para postar!</p>
            </div>
        </div>
    </div>

    <div class="add-btn" onclick="postVideo()">+</div>

    <script>
        // Configuração do Banco de Dados (Firebase)
        const firebaseConfig = {
            databaseURL: "https://viewz-blog-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('videos');

        // Função para carregar vídeos do banco de dados
        db.on('value', (snapshot) => {
            const data = snapshot.val();
            const feed = document.getElementById('videoFeed');
            feed.innerHTML = '';
            
            if (data) {
                Object.values(data).reverse().forEach(videoUrl => {
                    const container = document.createElement('div');
                    container.className = 'video-container';
                    container.innerHTML = `
                        <video src="${videoUrl}" loop autoplay muted playsinline onclick="this.paused ? this.play() : this.pause()"></video>
                        <div class="ui-overlay">
                            <h2 class="font-bold text-lg">@alice_maker</h2>
                            <p class="text-sm">Novo vídeo no VIEWZ 🚀</p>
                        </div>
                    `;
                    feed.appendChild(container);
                });
            } else {
                feed.innerHTML = `<div class="video-container"><div class="text-center p-6"><h1 class="text-4xl font-bold mb-4">VIEWZ</h1><p class="text-gray-400">Toque no + para postar seu primeiro vídeo!</p></div></div>`;
            }
        });

        // Função para postar um novo vídeo
        function postVideo() {
            const url = prompt("Cole o link do vídeo (.mp4):");
            if (url && url.includes('.mp4')) {
                db.push(url);
                alert("Postado com sucesso!");
            } else {
                alert("Por favor, cole um link válido de vídeo .mp4");
            }
        }
    </script>
</body>
    </html>
